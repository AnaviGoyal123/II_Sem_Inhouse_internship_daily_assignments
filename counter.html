<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Style Counter</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#fff7ef,#f9d5d3);
    font-family:'Poppins',sans-serif;
}

.card{
    width:380px;
    padding:40px;
    text-align:center;
    background:#fffdf8;
    border:8px double #d4af37;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.2);
    position:relative;
}

.card::before,
.card::after{
    content:"❀";
    position:absolute;
    font-size:35px;
    color:#d4af37;
}

.card::before{
    top:10px;
    left:15px;
}

.card::after{
    bottom:10px;
    right:15px;
}

h1{
    font-family:'Cinzel',serif;
    color:#9b5d3f;
    margin-bottom:15px;
    letter-spacing:2px;
}

.subtitle{
    color:#8d6e63;
    font-size:15px;
    margin-bottom:20px;
}

#count{
    width:140px;
    height:140px;
    margin:25px auto;
    border:5px solid #d4af37;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:55px;
    font-weight:bold;
    color:#9b5d3f;
    background:#fff8ee;
    box-shadow:0 0 20px rgba(212,175,55,.35);
}

.buttons{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:15px;
}

button{
    width:60px;
    height:60px;
    border:none;
    border-radius:50%;
    font-size:28px;
    cursor:pointer;
    color:white;
    transition:.3s;
}

.plus{
    background:#8bc34a;
}

.minus{
    background:#ef5350;
}

.reset{
    margin-top:20px;
    width:160px;
    height:45px;
    border-radius:30px;
    background:#d4af37;
    font-size:17px;
    font-weight:bold;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 8px 20px rgba(0,0,0,.2);
}
</style>
</head>
<body>

<div class="card">
    <h1> Counter</h1>
    <p class="subtitle"> can be used for naamjap
    </p>

    <div id="count">0</div>

    <div class="buttons">
        <button class="minus" onclick="decrease()">−</button>
        <button class="plus" onclick="increase()">+</button>
    </div>

    <button class="reset" onclick="resetCounter()">Reset</button>
</div>

<script>
let count = 0;

function updateCounter(){
    document.getElementById("count").innerHTML = count;
}

function increase(){
    count++;
    updateCounter();
}

function decrease(){
    count--;
    updateCounter();
}

function resetCounter(){
    count = 0;
    updateCounter();
}
</script>

</body>
</html>

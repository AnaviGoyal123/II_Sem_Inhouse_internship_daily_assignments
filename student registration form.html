<title>Student Registration Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:mintcream;
    transition:0.4s;
}

.container{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
    transition:0.4s;
}

h2{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:5px;
}

textarea{
    resize:none;
    height:80px;
}

.gender,
.skills{
    margin-bottom:15px;
}

.gender input,
.skills input{
    width:auto;
    margin-right:5px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

#themeBtn{
    background:#333;
    color:white;
    margin-bottom:20px;
}

#registerBtn{
    background:cornflowerblue;
    color:white;
}

#registerBtn:hover{
    background:royalblue;
}

.error{
    color:red;
    font-size:13px;
    margin-top:-8px;
    margin-bottom:10px;
    display:block;
}

/* Dark Mode */

.dark-mode{
    background:#1b1b1b;
}

.dark-mode .container{
    background:#2f2f2f;
    color:white;
}

.dark-mode input,
.dark-mode select,
.dark-mode textarea{
    background:#444;
    color:white;
    border:1px solid #777;
}

.dark-mode #themeBtn{
    background:#ffc107;
    color:black;
}
</style>

</head>

<body>

<div class="container">

<button type="button" id="themeBtn" onclick="toggleTheme()">
🌙 Dark Mode
</button>

<form>

<h2>Student Registration Form</h2>

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">
<span class="error" id="nameError"></span>

<label>Email</label>
<input type="email" id="email" placeholder="Enter your email">
<span class="error" id="emailError"></span>

<label>Password</label>
<input type="password" id="password" placeholder="Create password">
<span class="error" id="passwordError"></span>

<label>Mobile Number</label>
<input type="tel" id="mobile" placeholder="Enter your mobile number">
<span class="error" id="mobileError"></span>

<label>Date of Birth</label>
<input type="date" id="dob">
<span class="error" id="dobError"></span>

<label>Gender</label>

<div class="gender">
<input type="radio" name="gender"> Male <br>
<input type="radio" name="gender"> Female <br>
<input type="radio" name="gender"> Other
</div>

<label>Course</label>

<select id="course">
    <option value="">Select Course</option>
    <option>CSE</option>
    <option>AI &amp; ML</option>
    <option>DS</option>
    <option>IOT</option>
    <option>Cyber Security</option>
</select>

<span class="error" id="courseError"></span>

<label>Skills</label>

<div class="skills">
<input type="checkbox"> HTML <br>
<input type="checkbox"> CSS <br>
<input type="checkbox"> JavaScript <br>
<input type="checkbox"> PHP
</div>

<label>Upload Resume</label>
<input type="file">

<label>About Yourself</label>

<textarea id="about" placeholder="Write something about yourself"></textarea>

<span class="error" id="aboutError"></span>

<button type="button" id="registerBtn" onclick="validateForm()">
Register
</button>

</form>

</div>

<script>

function toggleTheme(){

    document.body.classList.toggle("dark-mode");

    let btn=document.getElementById("themeBtn");

    if(document.body.classList.contains("dark-mode")){
        btn.innerHTML=" Light Mode";
    }
    else{
        btn.innerHTML=" Dark Mode";
    }
}

function validateForm(){

    let valid=true;

    document.querySelectorAll(".error").forEach(function(e){
        e.innerHTML="";
    });

    let name=document.getElementById("name").value.trim();
    let email=document.getElementById("email").value.trim();
    let password=document.getElementById("password").value.trim();
    let mobile=document.getElementById("mobile").value.trim();
    let dob=document.getElementById("dob").value;
    let course=document.getElementById("course").value;
    let about=document.getElementById("about").value.trim();

    if(name==""){
        document.getElementById("nameError").innerHTML="* Name is required";
        valid=false;
    }

    if(email==""){
        document.getElementById("emailError").innerHTML="* Email is required";
        valid=false;
    }

    if(password==""){
        document.getElementById("passwordError").innerHTML="* Password is required";
        valid=false;
    }

    if(mobile==""){
        document.getElementById("mobileError").innerHTML="* Mobile number is required";
        valid=false;
    }

    if(dob==""){
        document.getElementById("dobError").innerHTML="* Date of Birth is required";
        valid=false;
    }

    if(course==""){
        document.getElementById("courseError").innerHTML="* Please select a course";
        valid=false;
    }

    if(about==""){
        document.getElementById("aboutError").innerHTML="* Please write something about yourself";
        valid=false;
    }

    if(valid){
        alert("🎉 Registration Successful!");
    }

}

</script>
